<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center;
           align-items: center; height: 100vh; margin: 0; background: #fafafa; }
    p { color: #555; font-size: 1.1rem; }
  </style>
</head>
<body>
  <p>Redirecionando para o Instagram...</p>
  <script>
    var username = "leandroleadmkt";
    var appLink  = "instagram://user?username=" + username;
    var webLink  = "https://www.instagram.com/" + username + "/";
    window.location.href = appLink;
    setTimeout(function () {
      window.location.href = webLink;
    }, 1500);
  </script>
</body>
</html>
